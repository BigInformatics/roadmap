<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Roadmap</title>
<style>
  :root {
    --bg: #0b0c10;
    --surface: #1f2833;
    --surface-2: #2a3542;
    --ink: #c5c6c7;
    --muted: #8899a6;
    --accent: #66fcf1;
    --accent-dim: #45a29e;
    --danger: #ff6b6b;
    --warning: #feca57;
    --success: #1dd1a1;
    --gold: #feca57;
    --gold-bg: rgba(254, 202, 87, 0.16);
    --border: #2a3542;
    --radius: 6px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --name-col: 240px;
    --month-col: 55px;
    --month-count: 84;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .brand { display: flex; align-items: center; gap: 0.75rem; min-width: 280px; }
  .brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); flex-shrink: 0; }
  .brand h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .brand-subline { color: var(--muted); font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .last-updated { color: var(--gold); font-size: 0.75rem; }

  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .search-box { min-width: 220px; max-width: 320px; }
  .filter-chip { color: var(--success); border-color: rgba(29,209,161,0.35); background: rgba(29,209,161,0.08); display: none; }
  .filter-chip.active { display: inline-flex; align-items: center; }
  .btn, select.btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.15s;
    white-space: nowrap;
    min-height: 38px;
  }
  .btn:hover { background: var(--accent-dim); color: var(--bg); border-color: var(--accent-dim); }
  .btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .btn.danger:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn.small { padding: 0.35rem 0.65rem; font-size: 0.75rem; min-height: 30px; }
  .btn.ghost { background: transparent; }

  .main { padding: 2rem; max-width: 100%; margin: 0 auto; }
  .product-toggle-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; max-width: 1600px; }
  .toggle-pill { display: inline-flex; align-items: center; gap: 0.45rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.4rem 0.75rem; font-size: 0.8rem; cursor: pointer; color: var(--muted); }
  .toggle-pill input { width: auto; accent-color: var(--accent); }
  .toggle-pill.enabled { color: var(--ink); border-color: rgba(102,252,241,0.35); background: rgba(102,252,241,0.07); }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; max-width: 1600px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; }
  .stat-value { font-size: 1.75rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

  .roadmap-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; box-shadow: var(--shadow); }
  .timeline-header, .swimlane-header, .deliverable-row { min-width: calc(var(--name-col) + (var(--month-col) * var(--month-count))); }
  .timeline-header { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 50; }
  .th-cell { flex-shrink: 0; padding: 0.4rem 0.2rem; font: inherit; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); background: transparent; border: 0; border-right: 1px solid var(--border); text-align: center; line-height: 1.3; }
  .th-cell:first-child { width: var(--name-col); text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; border-left: none; display: flex; align-items: center; }
  .th-cell:not(:first-child) { width: var(--month-col); }
  .th-cell.current-month { background: var(--gold-bg); color: var(--gold); box-shadow: inset 0 0 0 1px rgba(254,202,87,0.35); }
  .th-cell.month-selectable { cursor: pointer; user-select: none; }
  .th-cell.month-selectable:hover { background: rgba(29,209,161,0.08); color: var(--success); }
  .th-cell.selected-month, .cell.selected-month { background: rgba(29,209,161,0.14); box-shadow: inset 0 0 0 1px rgba(29,209,161,0.35); }
  .th-cell.selected-month { color: var(--success); }
  .th-cell .year-tag { font-size: 0.55rem; color: inherit; display: block; margin-top: 1px; }

  .swimlane { border-bottom: 1px solid var(--border); }
  .swimlane:last-child { border-bottom: none; }
  .swimlane-header { display: flex; background: var(--surface-2); border-bottom: 1px solid var(--border); position: relative; }
  .product-name { width: var(--name-col); flex-shrink: 0; padding: 0.75rem 1rem; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid var(--border); }
  .product-meta { font-weight: 400; font-size: 0.75rem; color: var(--muted); margin-left: auto; }
  .product-bar { padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .progress-mini { height: 6px; background: var(--bg); border-radius: 3px; width: 120px; overflow: hidden; }
  .progress-mini-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .empty-state { padding: 2rem; color: var(--muted); }

  .deliverable-row { display: flex; border-bottom: 1px solid var(--border); transition: background 0.15s; position: relative; }
  .deliverable-row:hover { background: rgba(102, 252, 241, 0.03); }
  .del-name { width: var(--name-col); flex-shrink: 0; padding: 0.5rem 1rem; font-size: 0.8rem; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; gap: 0.15rem; background: rgba(31,40,51,0.75); z-index: 2; }
  .del-name .title { font-weight: 500; }
  .del-name .owner { font-size: 0.7rem; color: var(--muted); }
  .cell { width: var(--month-col); flex-shrink: 0; border-right: 1px solid var(--border); position: relative; min-height: 42px; padding: 3px; }
  .cell.current-month { background: var(--gold-bg); box-shadow: inset 0 0 0 1px rgba(254,202,87,0.2); }

  .due-chip { display: block; width: 100%; padding: 0.18rem 0.25rem; margin-bottom: 2px; border-radius: 4px; font-size: 0.58rem; line-height: 1.1; cursor: pointer; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 4; }
  .due-chip:hover { filter: brightness(1.25); overflow: visible; white-space: normal; z-index: 25; position: relative; }

  .status-not-started { background: rgba(136, 153, 166, 0.15); color: var(--muted); border-color: rgba(136,153,166,0.3); }
  .status-in-progress { background: rgba(102, 252, 241, 0.12); color: var(--accent); border-color: rgba(102,252,241,0.3); }
  .status-at-risk { background: rgba(255, 107, 107, 0.12); color: var(--danger); border-color: rgba(255,107,107,0.3); }
  .status-completed { background: rgba(29, 209, 161, 0.12); color: var(--success); border-color: rgba(29,209,161,0.3); }
  .status-blocked, .status-on-hold { background: rgba(255, 107, 107, 0.08); color: var(--danger); border-color: rgba(255,107,107,0.2); border-style: dashed; }
  .status-cancelled { background: rgba(136, 153, 166, 0.08); color: var(--muted); border-color: rgba(136,153,166,0.22); border-style: dashed; text-decoration: line-through; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; margin-right: 0.1rem; flex-shrink: 0; }
  .status-dot.not-started { background: var(--muted); }
  .status-dot.in-progress { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
  .status-dot.at-risk { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
  .status-dot.completed { background: var(--success); }
  .status-dot.blocked, .status-dot.on-hold { background: var(--danger); opacity: 0.6; }
  .status-dot.cancelled { background: var(--muted); opacity: 0.5; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .detail-panel { position: fixed; right: -680px; top: 0; width: 660px; max-width: 100%; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); box-shadow: var(--shadow); z-index: 200; transition: right 0.25s ease; overflow-y: auto; padding: 1.5rem; }
  .detail-panel.open { right: 0; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .panel-header h2 { font-size: 1.1rem; font-weight: 600; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--ink); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; letter-spacing: 0.03em; }
  .field .value { font-size: 0.9rem; }
  .editable, textarea, input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem; width: 100%; color: var(--ink); font-family: inherit; font-size: 0.85rem; resize: vertical; }
  textarea.editable { min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  .status-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0 1rem; }
  .notes-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .notes-list li { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem; font-size: 0.8rem; color: var(--muted); }
  .due-summary { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem; }
  .due-summary.empty { color: var(--muted); font-size: 0.85rem; }
  .due-count { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.45rem; }
  .due-pill-grid { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .due-date-pill { display: inline-flex; align-items: center; min-height: 24px; padding: 0.2rem 0.45rem; border: 1px solid; border-radius: 999px; font-size: 0.76rem; line-height: 1; cursor: pointer; }
  .due-date-pill.active { outline: 2px solid var(--accent); outline-offset: 2px; }
  .due-note { color: var(--muted); font-size: 0.72rem; margin-left: 0.3rem; }
  .due-more { margin-top: 0.5rem; }
  .due-more summary { color: var(--accent); cursor: pointer; font-size: 0.8rem; }
  .due-more .due-pill-grid { margin-top: 0.45rem; max-height: 7rem; overflow-y: auto; padding-right: 0.25rem; }
  .doc-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }
  .doc-card-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.75rem; }
  .doc-card-title { display: flex; align-items: center; gap: 0.55rem; font-weight: 600; }
  .doc-card-title input { width: auto; accent-color: var(--accent); }
  .doc-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }
  .help-text { font-size: 0.8rem; color: var(--muted); }

  @media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; padding: 1rem; }
    .controls { justify-content: flex-start; }
    .main { padding: 1rem; }
    :root { --name-col: 170px; --month-col: 45px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1 id="pageTitle">Product Roadmap</h1>
      <div class="brand-subline"><span id="pageSubtitle">Interactive Deliverables &amp; Timeline</span><span id="lastUpdated" class="last-updated"></span></div>
    </div>
  </div>
  <div class="controls">
    <input class="search-box" id="taskSearch" type="search" placeholder="Search tasks..." aria-label="Search tasks">
    <button class="btn filter-chip" id="btnClearMonth" type="button">Clear month</button>
    <select class="btn" id="statusFilter">
      <option value="all">All Statuses</option>
      <option value="in-progress">In Progress</option>
      <option value="at-risk">At Risk</option>
      <option value="blocked">Blocked</option>
      <option value="not-started">Not Started</option>
      <option value="completed">Completed</option>
      <option value="on-hold">On Hold</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <button class="btn" id="btnNow">Jump to Now</button>
    <button class="btn" id="btnEdit">Edit Data</button>
    <button class="btn danger" id="btnClearCache">Clear Cache</button>
  </div>
</header>

<div class="main">
  <div class="product-toggle-bar" id="productToggleBar"></div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statProducts">0</div><div class="stat-label">Products On</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Deliverables</div></div>
    <div class="stat-card"><div class="stat-value" id="statInProgress" style="color:var(--accent)">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-value" id="statAtRisk" style="color:var(--danger)">0</div><div class="stat-label">At Risk</div></div>
    <div class="stat-card"><div class="stat-value" id="statBlocked" style="color:var(--danger)">0</div><div class="stat-label">Blocked</div></div>
    <div class="stat-card"><div class="stat-value" id="statCompleted" style="color:var(--success)">0</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value" id="statDueThisMonth" style="color:var(--warning)">0</div><div class="stat-label">Due This Month</div></div>
  </div>
  <div class="roadmap-wrap" id="roadmapWrap">
    <div class="timeline-header" id="timelineHeader"></div>
    <div id="roadmapBody"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header"><h2 id="panelTitle">Details</h2><button class="close-btn" id="btnClose">&times;</button></div>
  <div id="panelContent"></div>
</div>

<script>
const STORAGE_KEY = 'product-roadmap-v3-documents';
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS = [];
for (let y = 2026; y <= 2032; y++) for (let i = 0; i < 12; i++) MONTHS.push(`${MONTH_NAMES[i]} ${y}`);
document.documentElement.style.setProperty('--month-count', MONTHS.length);

const DEFAULT_DOCUMENTS = [
  {
    id: 'backend-platform',
    enabled: true,
    data: {
      project: 'Backend Platform',
      title: 'Product Roadmap',
      subtitle: 'Interactive Deliverables & Timeline',
      lastUpdated: '2026-05-08 10:00:00 ET',
      owner: 'Engineering Team',
      deliverables: [
        { id: 'bp-1', title: 'API Authentication', owner: 'Engineering Team', status: 'in-progress', start: 'May 2026', end: 'Jun 2026', desc: 'Implement OAuth2 and JWT token management for API endpoints.', dueDates: [{ date: '05/15/2026', status: 'in-progress', note: 'Token endpoint handoff.' }, { date: '06/30/2026', status: 'not-started', note: '' }], notes: [] },
        { id: 'bp-2', title: 'Database Migration', owner: 'Engineering Team', status: 'not-started', start: 'Jul 2026', end: 'Aug 2026', desc: 'Migrate primary database to a new cluster with a staged cutover plan.', dueDates: [{ date: '07/15/2026', status: 'not-started', note: '' }, { date: '08/28/2026', status: 'not-started', note: '' }], notes: [] }
      ]
    }
  },
  {
    id: 'web-application',
    enabled: true,
    data: {
      project: 'Web Application',
      title: 'Product Roadmap',
      subtitle: 'Interactive Deliverables & Timeline',
      lastUpdated: '2026-05-08 10:00:00 ET',
      owner: 'Frontend Team',
      deliverables: [
        { id: 'wa-1', title: 'Dashboard Redesign', owner: 'Frontend Team', status: 'completed', start: 'May 2026', end: 'May 2026', desc: 'Refresh the dashboard with improved hierarchy and responsive layout.', dueDates: [{ date: '05/29/2026', status: 'completed', note: 'Released.' }], notes: [] },
        { id: 'wa-2', title: 'Settings Panel', owner: 'Frontend Team', status: 'in-progress', start: 'Jun 2026', end: 'Jul 2026', desc: 'Build a settings and preferences interface with validation.', dueDates: [{ date: '06/15/2026', status: 'in-progress', note: '' }, { date: '07/31/2026', status: 'not-started', note: '' }], notes: [] }
      ]
    }
  }
];

let DOCUMENTS = loadDocuments();
let currentStatusFilter = 'all';
let currentSearchQuery = '';
let selectedMonthFilter = null;
let selectedStatus = null;
let selectedDeliverable = null;
let selectedDocument = null;
let selectedDueDate = null;

function $(sel) { return document.querySelector(sel); }
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function monthIndex(m) { return MONTHS.indexOf(m); }
function statusClass(s) { return 'status-' + s; }
function statusLabel(s) { return { 'not-started':'Not Started','in-progress':'In Progress','at-risk':'At Risk','completed':'Completed','blocked':'Blocked','on-hold':'On Hold','cancelled':'Cancelled' }[s] || s; }
function supportedStatuses() { return ['not-started','in-progress','at-risk','blocked','completed','on-hold','cancelled']; }
function productName(doc) { return doc?.data?.project || doc?.data?.product || doc?.name || 'Roadmap'; }
function enabledDocuments() { return DOCUMENTS.filter(d => d.enabled); }
function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function slugify(v) { return String(v || 'roadmap').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'roadmap'; }
function getCurrentMonthKey() { const now = new Date(); return `${MONTH_NAMES[now.getMonth()]} ${now.getFullYear()}`; }
function normalizeDueDate(item, fallbackStatus = 'not-started') {
  if (item && typeof item === 'object') {
    return { date: String(item.date || '').trim(), status: item.status || fallbackStatus, note: item.note || '' };
  }
  return { date: String(item || '').trim(), status: fallbackStatus, note: '' };
}
function dueDateValue(item) { return normalizeDueDate(item).date; }
function dueDateStatus(item, del) { return normalizeDueDate(item, del?.status || 'not-started').status; }
function monthKeyFromDueDate(value) {
  const text = dueDateValue(value);
  const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!match) return null;
  const month = Number(match[1]);
  const year = Number(match[3]);
  if (month < 1 || month > 12) return null;
  return `${MONTH_NAMES[month - 1]} ${year}`;
}
function dueDatesForMonth(del, monthKey) {
  return (Array.isArray(del.dueDates) ? del.dueDates : []).filter(d => monthKeyFromDueDate(d) === monthKey);
}
function formatDueDates(del) {
  const dates = Array.isArray(del.dueDates) ? del.dueDates : [];
  return dates.length ? dates.map(dueDateValue).join(' • ') : '';
}
function parseDueDate(value) {
  const match = dueDateValue(value).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!match) return null;
  return new Date(Number(match[3]), Number(match[1]) - 1, Number(match[2]));
}
function compareDueDates(a, b) {
  const parsedA = parseDueDate(a);
  const parsedB = parseDueDate(b);
  if (parsedA && parsedB) return parsedA - parsedB;
  if (parsedA) return -1;
  if (parsedB) return 1;
  return dueDateValue(a).localeCompare(dueDateValue(b));
}
function renderDueDatesCompact(del, activeDueDate = selectedDueDate) {
  const dates = Array.isArray(del.dueDates) ? del.dueDates.slice().sort(compareDueDates) : [];
  if (!dates.length) return '<div class="due-summary empty">No due dates provided.</div>';
  const limit = 6;
  const pill = d => {
    const idx = del.dueDates.indexOf(d);
    const active = activeDueDate === d ? ' active' : '';
    const note = d.note ? '<span class="due-note">note</span>' : '';
    return `<button type="button" class="due-date-pill ${statusClass(dueDateStatus(d, del))}${active}" data-due-index="${idx}" title="${escapeHtml(d.note || monthKeyFromDueDate(d) || '')}">${escapeHtml(dueDateValue(d))}${note}</button>`;
  };
  const visible = dates.slice(0, limit).map(pill).join('');
  const hidden = dates.slice(limit).map(pill).join('');
  return `
    <div class="due-summary">
      <div class="due-count">${dates.length} due date${dates.length === 1 ? '' : 's'}${activeDueDate ? ` • editing ${escapeHtml(dueDateValue(activeDueDate))}` : ''}</div>
      <div class="due-pill-grid">${visible}</div>
      ${hidden ? `<details class="due-more"><summary>Show ${dates.length - limit} more</summary><div class="due-pill-grid">${hidden}</div></details>` : ''}
    </div>`;
}
function deliverableMatchesSearch(del) {
  const q = currentSearchQuery.trim().toLowerCase();
  if (!q) return true;
  const dueText = (del.dueDates || []).map(d => [dueDateValue(d), dueDateStatus(d, del), d.note || ''].join(' ')).join(' ');
  const haystack = [del.title, del.owner, del.status, del.start, del.end, del.desc, dueText, ...(del.notes || [])]
    .join(' ')
    .toLowerCase();
  return haystack.includes(q);
}
function deliverableMatchesFilters(del) {
  const statusOk = currentStatusFilter === 'all' || del.status === currentStatusFilter || (del.dueDates || []).some(d => dueDateStatus(d, del) === currentStatusFilter);
  const monthOk = !selectedMonthFilter || dueDatesForMonth(del, selectedMonthFilter).length > 0;
  return statusOk && monthOk && deliverableMatchesSearch(del);
}
function getEasternTimestamp() {
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/New_York', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).formatToParts(new Date());
  const p = Object.fromEntries(parts.map(x => [x.type, x.value]));
  return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute}:${p.second} ET`;
}
function normalizeDocument(item, index = 0) {
  const raw = item && item.data ? item : { data: item || {} };
  const data = raw.data || {};
  return {
    id: raw.id || slugify(data.project || data.product || `roadmap-${index + 1}`),
    enabled: raw.enabled !== false,
    data: {
      project: data.project || data.product || `Roadmap ${index + 1}`,
      title: data.title || 'Product Roadmap',
      subtitle: data.subtitle || 'Interactive Deliverables & Timeline',
      lastUpdated: data.lastUpdated || '',
      owner: data.owner || '',
      deliverables: Array.isArray(data.deliverables) ? data.deliverables.map((d, dIdx) => ({
        id: d.id || `${slugify(data.project || data.product || `roadmap-${index + 1}`)}-${String(dIdx + 1).padStart(3, '0')}`,
        title: d.title || `Deliverable ${dIdx + 1}`,
        owner: d.owner || data.owner || '',
        status: d.status || 'not-started',
        start: d.start || '',
        end: d.end || d.start || '',
        desc: d.desc || '',
        dueDates: Array.isArray(d.dueDates) ? d.dueDates.map(item => normalizeDueDate(item, d.status || 'not-started')).filter(item => item.date) : [],
        notes: Array.isArray(d.notes) ? d.notes : []
      })) : []
    }
  };
}
function normalizeDocuments(value) {
  if (Array.isArray(value)) return value.map(normalizeDocument);
  if (value && Array.isArray(value.documents)) return value.documents.map(normalizeDocument);
  if (value && typeof value === 'object') return [normalizeDocument(value, 0)];
  return deepClone(DEFAULT_DOCUMENTS);
}
function loadDocuments() {
  try { const cached = localStorage.getItem(STORAGE_KEY); if (cached) return normalizeDocuments(JSON.parse(cached)); } catch(e) { console.warn('Unable to load cache', e); }
  return deepClone(DEFAULT_DOCUMENTS);
}
function saveCache() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCUMENTS)); }
function touchDocument(doc) { if (doc?.data) doc.data.lastUpdated = getEasternTimestamp(); }

function renderHeader() {
  const on = enabledDocuments();
  const first = on[0]?.data || DOCUMENTS[0]?.data || {};
  const title = first.title || 'Product Roadmap';
  const subtitle = on.length > 1 ? `${on.length} products enabled` : (first.subtitle || 'Interactive Deliverables & Timeline');
  const newest = on.map(d => d.data.lastUpdated).filter(Boolean).sort().at(-1);
  $('#pageTitle').textContent = title;
  $('#pageSubtitle').textContent = subtitle;
  $('#lastUpdated').textContent = newest ? `Last updated: ${newest}` : '';
  document.title = title;
}

function renderProductToggles() {
  const bar = $('#productToggleBar');
  bar.innerHTML = '';
  DOCUMENTS.forEach((doc, idx) => {
    const label = document.createElement('label');
    label.className = 'toggle-pill' + (doc.enabled ? ' enabled' : '');
    label.innerHTML = `<input type="checkbox" ${doc.enabled ? 'checked' : ''} data-doc-toggle="${idx}"> ${escapeHtml(productName(doc))}`;
    bar.appendChild(label);
  });
  document.querySelectorAll('[data-doc-toggle]').forEach(input => input.addEventListener('change', e => {
    DOCUMENTS[Number(e.target.dataset.docToggle)].enabled = e.target.checked;
    saveCache();
    renderRoadmap();
  }));
}

function renderTimelineHeader() {
  const h = $('#timelineHeader');
  const currentIdx = monthIndex(getCurrentMonthKey());
  h.innerHTML = '<div class="th-cell">Product / Deliverable</div>';
  MONTHS.forEach((m, idx) => {
    const [month, year] = m.split(' ');
    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'th-cell month-selectable' + (idx === currentIdx ? ' current-month' : '') + (m === selectedMonthFilter ? ' selected-month' : '');
    el.innerHTML = `<span>${month}</span>${month === 'Jan' ? `<span class="year-tag">${year}</span>` : ''}`;
    el.title = `Filter to tasks due in ${m}`;
    el.addEventListener('click', () => {
      selectedMonthFilter = selectedMonthFilter === m ? null : m;
      renderRoadmap();
    });
    h.appendChild(el);
  });
}

function getVisibleDeliverables(doc) {
  return (doc.data.deliverables || []).filter(deliverableMatchesFilters);
}
function renderStats() {
  let total=0, ip=0, ar=0, bl=0, comp=0, due=0;
  const thisMonth = getCurrentMonthKey();
  enabledDocuments().forEach(doc => getVisibleDeliverables(doc).forEach(d => {
    total++;
    if (d.status === 'in-progress') ip++;
    if (d.status === 'at-risk') ar++;
    if (d.status === 'blocked' || d.status === 'on-hold') bl++;
    if (d.status === 'completed') comp++;
    due += dueDatesForMonth(d, thisMonth).length;
  }));
  $('#statProducts').textContent = enabledDocuments().length;
  $('#statTotal').textContent = total;
  $('#statInProgress').textContent = ip;
  $('#statAtRisk').textContent = ar;
  $('#statBlocked').textContent = bl;
  $('#statCompleted').textContent = comp;
  $('#statDueThisMonth').textContent = due;
  const monthBtn = $('#btnClearMonth');
  if (monthBtn) {
    monthBtn.textContent = selectedMonthFilter ? `Clear ${selectedMonthFilter}` : 'Clear month';
    monthBtn.classList.toggle('active', Boolean(selectedMonthFilter));
  }
  const search = $('#taskSearch');
  if (search && search.value !== currentSearchQuery) search.value = currentSearchQuery;
}

function renderRoadmap() {
  renderHeader();
  renderProductToggles();
  renderTimelineHeader();
  const body = $('#roadmapBody');
  body.innerHTML = '';
  const currentIdx = monthIndex(getCurrentMonthKey());
  const docs = enabledDocuments();

  if (!docs.length) {
    body.innerHTML = '<div class="empty-state">No products are enabled. Toggle products on above or use Edit Data to add roadmap JSON documents.</div>';
    renderStats();
    return;
  }

  docs.forEach(doc => {
    const data = doc.data;
    const deliverables = getVisibleDeliverables(doc);
    const completed = (data.deliverables || []).filter(d => d.status === 'completed').length;
    const progress = (data.deliverables || []).length ? Math.round((completed / data.deliverables.length) * 100) : 0;
    const swimlane = document.createElement('div');
    swimlane.className = 'swimlane';
    const hdr = document.createElement('div');
    hdr.className = 'swimlane-header';
    hdr.innerHTML = `<div class="product-name">${escapeHtml(productName(doc))}<span class="product-meta">${escapeHtml(data.owner || '')} &bull; ${completed}/${(data.deliverables || []).length} done</span></div><div class="product-bar"><div class="progress-mini"><div class="progress-mini-fill" style="width:${progress}%"></div></div><span style="font-size:0.75rem;color:var(--muted)">${progress}%</span></div>`;
    swimlane.appendChild(hdr);

    if (!deliverables.length) {
      const empty = document.createElement('div');
      empty.className = 'deliverable-row';
      empty.innerHTML = `<div class="del-name"><div class="title">No matching deliverables</div><div class="owner">${currentStatusFilter === 'all' ? 'Add items in Edit Data' : 'Change the status filter'}</div></div>` + MONTHS.map((m, idx) => `<div class="cell${idx === currentIdx ? ' current-month' : ''}"></div>`).join('');
      swimlane.appendChild(empty);
    }

    deliverables.forEach(del => {
      const row = document.createElement('div');
      row.className = 'deliverable-row';
      row.dataset.id = del.id;
      const nameCell = document.createElement('div');
      nameCell.className = 'del-name';
      nameCell.innerHTML = `<div class="title">${escapeHtml(del.title)}</div>${del.owner ? `<div class="owner">${escapeHtml(del.owner)}</div>` : ''}`;
      row.appendChild(nameCell);
      MONTHS.forEach((m, idx) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (idx === currentIdx ? ' current-month' : '') + (m === selectedMonthFilter ? ' selected-month' : '');
        dueDatesForMonth(del, m).forEach(dueDate => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = `due-chip ${statusClass(dueDateStatus(dueDate, del))}`;
          chip.textContent = dueDateValue(dueDate);
          chip.title = `${del.title} due ${dueDateValue(dueDate)}${dueDate.note ? ` — ${dueDate.note}` : ''}`;
          chip.addEventListener('click', evt => { evt.stopPropagation(); openDetail(del, doc, dueDate); });
          cell.appendChild(chip);
        });
        row.appendChild(cell);
      });
      swimlane.appendChild(row);
    });
    body.appendChild(swimlane);
  });
  renderStats();
}

function openPanel(title, html) {
  $('#panelTitle').textContent = title;
  $('#panelContent').innerHTML = html;
  $('#overlay').classList.add('open');
  $('#detailPanel').classList.add('open');
}
function closeDetail() { $('#overlay').classList.remove('open'); $('#detailPanel').classList.remove('open'); selectedStatus = null; selectedDeliverable = null; selectedDocument = null; selectedDueDate = null; }

function openDetail(del, doc, dueDate = null) {
  selectedDeliverable = del;
  selectedDocument = doc;
  selectedDueDate = dueDate || (Array.isArray(del.dueDates) && del.dueDates.length === 1 ? del.dueDates[0] : null);
  selectedStatus = selectedDueDate ? dueDateStatus(selectedDueDate, del) : del.status;
  const notes = (del.notes || []).map(n => `<li>${escapeHtml(n)}</li>`).join('') || '<li>No task notes yet.</li>';
  const dueDates = renderDueDatesCompact(del, selectedDueDate);
  const selectedNote = selectedDueDate ? selectedDueDate.note || '' : '';
  openPanel(del.title, `
    <div class="field"><label>${selectedDueDate ? `Due Date Status: ${escapeHtml(dueDateValue(selectedDueDate))}` : 'Task Status'}</label><div class="status-buttons" id="statusButtons">
      ${supportedStatuses().map(s => `<button class="btn small ${s === selectedStatus ? 'active' : ''}" data-status="${s}">${statusLabel(s)}</button>`).join('')}
    </div></div>
    <div class="field"><label>Product</label><div class="value">${escapeHtml(productName(doc))}</div></div>
    <div class="field"><label>Owner</label><div class="value">${escapeHtml(del.owner || doc.data.owner || '')}</div></div>
    <div class="field"><label>Timeline</label><div class="value">${escapeHtml(del.start)} &rarr; ${escapeHtml(del.end)}</div></div>
    <div class="field"><label>Due Dates</label>${dueDates}<div class="help-text" style="margin-top:0.4rem">Click a due-date chip to edit that date's status and note.</div></div>
    <div class="field"><label>Description</label><div class="value">${escapeHtml(del.desc || 'No description provided.')}</div></div>
    <div class="field"><label>${selectedDueDate ? 'Due Date Note' : 'Status Note'}</label><textarea id="statusNote" rows="4" placeholder="Optional note...">${escapeHtml(selectedNote)}</textarea></div>
    <button class="btn active" id="btnSaveStatus">Save Changes</button>
    <div class="field" style="margin-top:1rem"><label>Task Notes</label><ul class="notes-list">${notes}</ul></div>
  `);
  document.querySelectorAll('[data-due-index]').forEach(btn => btn.addEventListener('click', e => {
    const idx = Number(e.currentTarget.dataset.dueIndex);
    openDetail(del, doc, del.dueDates[idx]);
  }));
  document.querySelectorAll('[data-status]').forEach(btn => btn.addEventListener('click', e => {
    selectedStatus = e.target.dataset.status;
    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
  }));
  $('#btnSaveStatus').addEventListener('click', saveStatusChange);
}

function saveStatusChange() {
  if (!selectedDeliverable || !selectedDocument) return;
  const note = ($('#statusNote').value || '').trim();
  if (selectedDueDate) {
    selectedDueDate.status = selectedStatus;
    selectedDueDate.note = note;
  } else {
    const oldStatus = selectedDeliverable.status;
    selectedDeliverable.status = selectedStatus;
    if (!Array.isArray(selectedDeliverable.notes)) selectedDeliverable.notes = [];
    if (note || oldStatus !== selectedStatus) selectedDeliverable.notes.push(`${new Date().toISOString()} | ${selectedStatus} | ${note || `Status changed from ${oldStatus} to ${selectedStatus}`}`);
  }
  touchDocument(selectedDocument);
  saveCache();
  renderRoadmap();
  openDetail(selectedDeliverable, selectedDocument, selectedDueDate);
}

function openEditor() {
  const cards = DOCUMENTS.map((doc, i) => `
    <div class="doc-card" data-doc-card="${i}">
      <div class="doc-card-header">
        <label class="doc-card-title"><input type="checkbox" ${doc.enabled ? 'checked' : ''} data-edit-enabled="${i}"> ${escapeHtml(productName(doc))}</label>
        <div class="doc-actions">
          <button class="btn small" data-download-doc="${i}">Download</button>
          <button class="btn small danger" data-remove-doc="${i}">Remove</button>
        </div>
      </div>
      <textarea class="editable" data-doc-json="${i}">${escapeHtml(JSON.stringify(doc.data, null, 2))}</textarea>
    </div>`).join('');
  openPanel('Edit Product JSON Documents', `
    <div class="field"><label>Products</label><div class="help-text">Each card is an independent product roadmap JSON document. Check products on/off to control which swimlanes render together.</div></div>
    ${cards || '<div class="empty-state">No product JSON documents yet.</div>'}
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1rem">
      <button class="btn active" id="btnSaveJson">Save & Render</button>
      <button class="btn" id="btnAddDoc">Add Product JSON</button>
      <button class="btn" id="btnDownloadEnabled">Download Enabled JSONs</button>
      <button class="btn" id="btnDownloadAll">Download All JSONs</button>
      <button class="btn danger" id="btnClearCacheDrawer">Clear Cache</button>
    </div>
    <div class="field" style="margin-top:1rem"><label>Format</label><div class="value help-text">Paste one product object per card. Timeline dates use "Mon YYYY" (e.g. "Jun 2027"). Due dates use objects: { "date": "06/15/2026", "status": "in-progress", "note": "..." }. Legacy string due dates are migrated automatically.</div></div>
  `);
  document.querySelectorAll('[data-download-doc]').forEach(btn => btn.addEventListener('click', e => {
    const doc = DOCUMENTS[Number(e.target.dataset.downloadDoc)];
    downloadJson(doc.data, `${slugify(productName(doc))}.json`);
  }));
  document.querySelectorAll('[data-remove-doc]').forEach(btn => btn.addEventListener('click', e => {
    const idx = Number(e.target.dataset.removeDoc);
    if (!confirm(`Remove ${productName(DOCUMENTS[idx])} from this local roadmap set?`)) return;
    DOCUMENTS.splice(idx, 1);
    saveCache();
    renderRoadmap();
    openEditor();
  }));
  $('#btnSaveJson').addEventListener('click', saveEditorDocuments);
  $('#btnAddDoc').addEventListener('click', addProductDocument);
  $('#btnDownloadEnabled').addEventListener('click', () => downloadJson({ documents: enabledDocuments() }, 'enabled-product-roadmaps.json'));
  $('#btnDownloadAll').addEventListener('click', () => downloadJson({ documents: DOCUMENTS }, 'all-product-roadmaps.json'));
  $('#btnClearCacheDrawer').addEventListener('click', clearCache);
}

function saveEditorDocuments() {
  const next = [];
  const seenIds = new Set();
  try {
    document.querySelectorAll('[data-doc-json]').forEach(textarea => {
      const idx = Number(textarea.dataset.docJson);
      const parsed = JSON.parse(textarea.value);
      if (Array.isArray(parsed)) throw new Error(`Product card ${idx + 1} must contain one product object, not an array.`);
      const doc = normalizeDocument({
        id: DOCUMENTS[idx]?.id,
        enabled: document.querySelector(`[data-edit-enabled="${idx}"]`)?.checked !== false,
        data: parsed
      }, idx);
      if (seenIds.has(doc.id)) doc.id = `${doc.id}-${idx + 1}`;
      seenIds.add(doc.id);
      touchDocument(doc);
      next.push(doc);
    });
    DOCUMENTS = next;
    saveCache();
    renderRoadmap();
    openEditor();
  } catch(e) { alert('Invalid JSON: ' + e.message); }
}
function addProductDocument() {
  saveEditorDocuments();
  DOCUMENTS.push(normalizeDocument({ project: 'New Product', title: 'Product Roadmap', subtitle: 'Interactive Deliverables & Timeline', owner: 'Product Team', deliverables: [] }, DOCUMENTS.length));
  saveCache();
  renderRoadmap();
  openEditor();
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearCache() {
  if (!confirm('Clear localStorage cache and reset to embedded defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  DOCUMENTS = deepClone(DEFAULT_DOCUMENTS);
  renderRoadmap();
  closeDetail();
}

$('#taskSearch').addEventListener('input', e => { currentSearchQuery = e.target.value; renderRoadmap(); });
$('#btnClearMonth').addEventListener('click', () => { selectedMonthFilter = null; renderRoadmap(); });
$('#statusFilter').addEventListener('change', e => { currentStatusFilter = e.target.value; renderRoadmap(); });
$('#btnEdit').addEventListener('click', openEditor);
$('#btnClearCache').addEventListener('click', clearCache);
$('#btnClose').addEventListener('click', closeDetail);
$('#overlay').addEventListener('click', closeDetail);
$('#btnNow').addEventListener('click', () => {
  const idx = monthIndex(getCurrentMonthKey());
  if (idx < 0) return;
  const wrap = $('#roadmapWrap');
  const monthWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--month-col')) || 55;
  const nameWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--name-col')) || 240;
  wrap.scrollTo({ left: nameWidth + (monthWidth * idx) - (wrap.clientWidth / 2) + (monthWidth / 2), behavior: 'smooth' });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

renderRoadmap();
</script>
</body>
</html>
