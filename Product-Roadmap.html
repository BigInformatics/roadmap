<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Roadmap</title>
<style>
  :root {
    --bg: #0b0c10;
    --surface: #1f2833;
    --surface-2: #2a3542;
    --ink: #c5c6c7;
    --muted: #8899a6;
    --accent: #66fcf1;
    --accent-dim: #45a29e;
    --danger: #ff6b6b;
    --warning: #feca57;
    --success: #1dd1a1;
    --gold: #feca57;
    --gold-bg: rgba(254, 202, 87, 0.16);
    --border: #2a3542;
    --button-hover-ink: #0b0c10;
    --del-name-bg: rgba(31,40,51,0.75);
    --radius: 6px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --name-col: 240px;
    --month-col: 55px;
    --month-count: 84;
    color-scheme: dark;
  }

  body[data-theme="light"] {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --surface-2: #e9eef5;
    --ink: #18212f;
    --muted: #5d6b7a;
    --accent: #087c78;
    --accent-dim: #0f766e;
    --danger: #b42318;
    --warning: #b7791f;
    --success: #087f5b;
    --gold: #b7791f;
    --gold-bg: rgba(245, 158, 11, 0.16);
    --border: #d7dee8;
    --button-hover-ink: #ffffff;
    --del-name-bg: rgba(255,255,255,0.82);
    --shadow: 0 4px 20px rgba(24,33,47,0.12);
    color-scheme: light;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .brand { display: flex; align-items: center; gap: 0.75rem; min-width: 280px; }
  .brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); flex-shrink: 0; }
  .brand h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .brand-subline { color: var(--muted); font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .last-updated { color: var(--gold); font-size: 0.75rem; }

  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .search-box { min-width: 220px; max-width: 320px; }
  .date-select { min-width: 120px; }
  .icon-btn { display: inline-flex; align-items: center; gap: 0.4rem; }
  .icon-btn svg { width: 1rem; height: 1rem; display: block; flex-shrink: 0; }
  .filter-chip { color: var(--success); border-color: rgba(29,209,161,0.35); background: rgba(29,209,161,0.08); display: none; }
  .filter-chip.active { display: inline-flex; align-items: center; }
  .btn, select.btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.15s;
    white-space: nowrap;
    min-height: 38px;
  }
  .btn:hover { background: var(--accent-dim); color: var(--button-hover-ink); border-color: var(--accent-dim); }
  .btn.active { background: var(--accent); color: var(--button-hover-ink); border-color: var(--accent); font-weight: 600; }
  .btn.danger:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn.small { padding: 0.35rem 0.65rem; font-size: 0.75rem; min-height: 30px; }
  .btn.ghost { background: transparent; }
  .theme-toggle { display: inline-flex; align-items: center; gap: 0.4rem; }
  .theme-toggle svg { width: 1rem; height: 1rem; display: block; }

  .main { padding: 2rem; max-width: 100%; margin: 0 auto; }
  .product-toggle-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; max-width: 1600px; }
  .toggle-pill { display: inline-flex; align-items: center; gap: 0.45rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.4rem 0.75rem; font-size: 0.8rem; cursor: pointer; color: var(--muted); }
  .toggle-pill input { width: auto; accent-color: var(--accent); }
  .toggle-pill.enabled { color: var(--ink); border-color: rgba(102,252,241,0.35); background: rgba(102,252,241,0.07); }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; max-width: 1600px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; }
  .stat-value { font-size: 1.75rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

  .roadmap-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; box-shadow: var(--shadow); }
  .linear-wrap { overflow-x: hidden; }
  .linear-wrap .timeline-header { display: block; min-width: 100%; }
  .linear-wrap .linear-header, .linear-wrap .linear-row { width: 100%; min-width: 0; box-sizing: border-box; }
  .linear-header, .linear-row { display: grid; grid-template-columns: minmax(180px, 1.1fr) minmax(260px, 2fr) minmax(180px, 1fr) minmax(150px, 0.8fr); gap: 1rem; align-items: center; }
  .linear-header { position: sticky; top: 0; z-index: 50; background: var(--surface-2); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; color: var(--muted); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .linear-row { min-height: 64px; border: 0; border-bottom: 1px solid var(--border); padding: 0.8rem 1rem; text-align: left; color: var(--ink); cursor: pointer; transition: transform 0.15s, filter 0.15s, background 0.15s; }
  .linear-row:hover { filter: brightness(1.15); transform: translateX(2px); }
  .linear-row.current-week { box-shadow: inset 4px 0 0 var(--gold), inset 0 0 0 1px rgba(254,202,87,0.35); background: var(--gold-bg); }
  .linear-row.current-week .linear-date { color: var(--gold); }
  .linear-date { font-weight: 700; color: var(--ink); }
  .linear-week-label { display: block; color: var(--gold); font-size: 0.7rem; font-weight: 700; margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .linear-task { font-weight: 600; display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
  .linear-meta { color: var(--muted); font-size: 0.78rem; margin-top: 0.18rem; }
  .linear-contract { color: var(--ink); font-size: 0.88rem; }
  .linear-status { justify-self: start; border: 1px solid; border-radius: 999px; padding: 0.25rem 0.55rem; font-size: 0.76rem; font-weight: 700; }
  .timeline-header, .swimlane-header, .deliverable-row { min-width: calc(var(--name-col) + (var(--month-col) * var(--month-count))); }
  .timeline-header { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 50; }
  .th-cell { flex-shrink: 0; padding: 0.4rem 0.2rem; font: inherit; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); background: transparent; border: 0; border-right: 1px solid var(--border); text-align: center; line-height: 1.3; }
  .th-cell:first-child { width: var(--name-col); text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; border-left: none; display: flex; align-items: center; }
  .th-cell:not(:first-child) { width: var(--month-col); }
  .th-cell.current-month { background: var(--gold-bg); color: var(--gold); box-shadow: inset 0 0 0 1px rgba(254,202,87,0.35); }
  .th-cell.month-selectable { cursor: pointer; user-select: none; }
  .th-cell.month-selectable:hover { background: rgba(29,209,161,0.08); color: var(--success); }
  .th-cell.selected-month, .cell.selected-month { background: rgba(29,209,161,0.14); box-shadow: inset 0 0 0 1px rgba(29,209,161,0.35); }
  .th-cell.selected-month { color: var(--success); }
  .th-cell .year-tag { font-size: 0.55rem; color: inherit; display: block; margin-top: 1px; }

  .swimlane { border-bottom: 1px solid var(--border); }
  .swimlane:last-child { border-bottom: none; }
  .swimlane-header { display: flex; background: var(--surface-2); border-bottom: 1px solid var(--border); position: relative; }
  .product-name { width: var(--name-col); flex-shrink: 0; padding: 0.75rem 1rem; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; border-right: 1px solid var(--border); }
  .product-meta { font-weight: 400; font-size: 0.75rem; color: var(--muted); margin-left: auto; }
  .product-bar { padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .progress-mini { height: 6px; background: var(--bg); border-radius: 3px; width: 120px; overflow: hidden; }
  .progress-mini-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .empty-state { padding: 2rem; color: var(--muted); }

  .deliverable-row { display: flex; border-bottom: 1px solid var(--border); transition: background 0.15s; position: relative; }
  .deliverable-row:hover { background: rgba(102, 252, 241, 0.03); }
  .del-name { width: var(--name-col); flex-shrink: 0; padding: 0.5rem 1rem; font-size: 0.8rem; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; gap: 0.15rem; background: var(--del-name-bg); z-index: 2; }
  .del-title-row { display: flex; align-items: center; gap: 0.35rem; min-width: 0; }
  .del-name .title { font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .del-name .owner { font-size: 0.7rem; color: var(--muted); }
  .favorite-toggle { appearance: none; background: transparent; border: 0; color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; width: 1.1rem; height: 1.1rem; flex-shrink: 0; }
  .favorite-toggle svg { width: 1rem; height: 1rem; display: block; }
  .favorite-toggle.active svg { fill: rgba(224,165,0,0.28); stroke: #e0a500; }
  .favorite-toggle:hover svg { stroke: #e0a500; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.1rem; }
  .tag-pill { display: inline-flex; align-items: center; gap: 0.2rem; border: 1px solid rgba(0,189,126,0.35); color: var(--success); background: rgba(0,189,126,0.08); border-radius: 999px; padding: 0.1rem 0.38rem; font-size: 0.66rem; line-height: 1.2; }
  .tag-pill svg, .tag-icon svg { width: 0.72rem; height: 0.72rem; display: block; flex-shrink: 0; }
  .chip-meta-icons { display: inline-flex; align-items: center; gap: 0.18rem; margin-left: 0.2rem; vertical-align: middle; }
  .cell { width: var(--month-col); flex-shrink: 0; border-right: 1px solid var(--border); position: relative; min-height: 42px; padding: 3px; }
  .cell.current-month { background: var(--gold-bg); box-shadow: inset 0 0 0 1px rgba(254,202,87,0.2); }

  .due-chip { display: flex; align-items: center; justify-content: center; gap: 0.15rem; width: 100%; padding: 0.18rem 0.25rem; margin-bottom: 2px; border-radius: 4px; font-size: 0.58rem; line-height: 1.1; cursor: pointer; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 4; }
  .due-chip:hover { filter: brightness(1.25); overflow: visible; white-space: normal; z-index: 25; position: relative; }
  .note-icon { display: inline-flex; align-items: center; justify-content: center; color: #bababa; flex-shrink: 0; vertical-align: text-bottom; }
  .note-icon svg { width: 0.9em; height: 0.9em; display: block; }
  .due-chip .note-icon { font-size: 0.8rem; }
  .linear-date-wrap { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
  .linear-date-wrap .note-icon { font-size: 1rem; }

  .status-not-started { background: rgba(136, 153, 166, 0.15); color: var(--muted); border-color: rgba(136,153,166,0.3); }
  .status-in-progress { background: rgba(102, 252, 241, 0.12); color: var(--accent); border-color: rgba(102,252,241,0.3); }
  .status-at-risk { background: rgba(255, 107, 107, 0.12); color: var(--danger); border-color: rgba(255,107,107,0.3); }
  .status-completed { background: rgba(29, 209, 161, 0.12); color: var(--success); border-color: rgba(29,209,161,0.3); }
  .status-blocked, .status-on-hold { background: rgba(255, 107, 107, 0.08); color: var(--danger); border-color: rgba(255,107,107,0.2); border-style: dashed; }
  .status-cancelled { background: rgba(136, 153, 166, 0.08); color: var(--muted); border-color: rgba(136,153,166,0.22); border-style: dashed; text-decoration: line-through; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; margin-right: 0.1rem; flex-shrink: 0; }
  .status-dot.not-started { background: var(--muted); }
  .status-dot.in-progress { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
  .status-dot.at-risk { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
  .status-dot.completed { background: var(--success); }
  .status-dot.blocked, .status-dot.on-hold { background: var(--danger); opacity: 0.6; }
  .status-dot.cancelled { background: var(--muted); opacity: 0.5; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .detail-panel { position: fixed; right: -680px; top: 0; width: 660px; max-width: 100%; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); box-shadow: var(--shadow); z-index: 200; transition: right 0.25s ease; overflow-y: auto; padding: 1.5rem; }
  .detail-panel.open { right: 0; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .panel-header h2 { font-size: 1.1rem; font-weight: 600; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--ink); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; letter-spacing: 0.03em; }
  .field .toggle-pill { display: inline-flex; text-transform: none; letter-spacing: 0; margin-bottom: 0; }
  .field .value { font-size: 0.9rem; }
  .editable, textarea, input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem; width: 100%; color: var(--ink); font-family: inherit; font-size: 0.85rem; resize: vertical; }
  textarea.editable { min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  .status-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0 1rem; }
  .notes-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .notes-list li { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem; font-size: 0.8rem; color: var(--muted); }
  .due-summary { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem; }
  .due-summary.empty { color: var(--muted); font-size: 0.85rem; }
  .due-count { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.45rem; }
  .due-pill-grid { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .due-date-pill { display: inline-flex; align-items: center; min-height: 24px; padding: 0.2rem 0.45rem; border: 1px solid; border-radius: 999px; font-size: 0.76rem; line-height: 1; cursor: pointer; }
  .due-date-pill.active { outline: 2px solid var(--accent); outline-offset: 2px; }
  .due-note { margin-left: 0.3rem; }
  .due-more { margin-top: 0.5rem; }
  .due-more summary { color: var(--accent); cursor: pointer; font-size: 0.8rem; }
  .due-more .due-pill-grid { margin-top: 0.45rem; max-height: 7rem; overflow-y: auto; padding-right: 0.25rem; }
  .doc-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }
  .doc-card-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.75rem; }
  .doc-card-title { display: flex; align-items: center; gap: 0.55rem; font-weight: 600; }
  .doc-card-title input { width: auto; accent-color: var(--accent); }
  .doc-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }
  .doc-summary { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.75rem; }
  .json-editor { display: none; margin-top: 0.75rem; }
  .json-editor.open { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
  .form-grid .span-2 { grid-column: 1 / -1; }
  .help-text { font-size: 0.8rem; color: var(--muted); }

  @media (max-width: 900px) {
    .linear-header { display: none; }
    .linear-row { grid-template-columns: 1fr; gap: 0.35rem; align-items: start; }
    .linear-status { margin-top: 0.25rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .span-2 { grid-column: auto; }
  }

  @media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; padding: 1rem; }
    .controls { justify-content: flex-start; }
    .main { padding: 1rem; }
    :root { --name-col: 170px; --month-col: 45px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1 id="pageTitle">Product Roadmap</h1>
      <div class="brand-subline"><span id="pageSubtitle">Interactive Deliverables &amp; Timeline</span><span id="lastUpdated" class="last-updated"></span></div>
    </div>
  </div>
  <div class="controls">
    <input class="search-box" id="taskSearch" type="search" placeholder="Search tasks or tags..." aria-label="Search tasks or tags">
    <button class="btn icon-btn" id="btnTagSearch" type="button" aria-pressed="false" title="Search tags only"></button>
    <button class="btn icon-btn" id="btnFavoritesOnly" type="button" aria-pressed="false" title="Show favorites only"></button>
    <select class="btn date-select" id="yearFilter" aria-label="Filter by year">
      <option value="">All Years</option>
    </select>
    <select class="btn date-select" id="monthFilter" aria-label="Filter by month">
      <option value="">All Months</option>
    </select>
    <button class="btn filter-chip" id="btnClearMonth" type="button">Clear date</button>
    <button class="btn active" id="btnViewToggle" type="button">Grid View</button>
    <select class="btn" id="statusFilter">
      <option value="all">All Statuses</option>
      <option value="in-progress">In Progress</option>
      <option value="at-risk">At Risk</option>
      <option value="blocked">Blocked</option>
      <option value="not-started">Not Started</option>
      <option value="completed">Completed</option>
      <option value="on-hold">On Hold</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <button class="btn theme-toggle" id="btnThemeToggle" type="button" aria-label="Switch to light mode"></button>
    <button class="btn" id="btnCopyMarkdown" type="button">Copy Markdown</button>
    <button class="btn" id="btnNow">Jump to Now</button>
    <button class="btn" id="btnEdit">Edit Data</button>
  </div>
</header>

<div class="main">
  <div class="product-toggle-bar" id="productToggleBar"></div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="statProducts">0</div><div class="stat-label">Products On</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Deliverables</div></div>
    <div class="stat-card"><div class="stat-value" id="statInProgress" style="color:var(--accent)">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card"><div class="stat-value" id="statAtRisk" style="color:var(--danger)">0</div><div class="stat-label">At Risk</div></div>
    <div class="stat-card"><div class="stat-value" id="statBlocked" style="color:var(--danger)">0</div><div class="stat-label">Blocked</div></div>
    <div class="stat-card"><div class="stat-value" id="statCompleted" style="color:var(--success)">0</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value" id="statDueThisMonth" style="color:var(--warning)">0</div><div class="stat-label">Due This Month</div></div>
  </div>
  <div class="roadmap-wrap" id="roadmapWrap">
    <div class="timeline-header" id="timelineHeader"></div>
    <div id="roadmapBody"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header"><h2 id="panelTitle">Details</h2><button class="close-btn" id="btnClose">&times;</button></div>
  <div id="panelContent"></div>
</div>

<script>
const STORAGE_KEY = 'product-roadmap-v3-documents';
const THEME_KEY = 'product-roadmap-theme';
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS = [];
for (let y = 2026; y <= 2032; y++) for (let i = 0; i < 12; i++) MONTHS.push(`${MONTH_NAMES[i]} ${y}`);
document.documentElement.style.setProperty('--month-count', MONTHS.length);

const DEFAULT_DOCUMENTS = [
  {
    id: 'backend-platform',
    enabled: true,
    data: {
      project: 'Backend Platform',
      title: 'Product Roadmap',
      subtitle: 'Interactive Deliverables & Timeline',
      lastUpdated: '2026-05-08 10:00:00 ET',

        dueDates.forEach(d => {
          lines.push(markdownListItem(`${dueDateValue(d)} — ${statusLabel(dueDateStatus(d, del))}`, '  '));
          if (d.note) lines.push(markdownListItem(`Note: ${d.note}`, '    '));
        });
      }
      if (Array.isArray(del.notes) && del.notes.length) {
        lines.push(markdownListItem('Task Notes:'));
        del.notes.forEach(note => lines.push(markdownListItem(note, '  ')));
      }
    });
  });
  return lines.filter((line, idx, arr) => !(line === '' && arr[idx - 1] === '')).join('\n').trim() + '\n';
}

async function copyMarkdownToClipboard() {
  const markdown = buildMarkdownExport();
  const btn = $('#btnCopyMarkdown');
  try {
    if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(markdown);
    else {
      const textarea = document.createElement('textarea');
      textarea.value = markdown;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }
    if (btn) {
      const original = btn.textContent;
      btn.textContent = 'Copied Markdown';
      btn.classList.add('active');
      setTimeout(() => { btn.textContent = original; btn.classList.remove('active'); }, 1500);
    }
  } catch(e) {
    alert('Unable to copy markdown: ' + e.message);
  }
}

function saveEditorDocuments(reopen = true) {
  const next = [];
  const seenIds = new Set();
  try {
    document.querySelectorAll('[data-doc-json]').forEach(textarea => {
      const idx = Number(textarea.dataset.docJson);
      const parsed = JSON.parse(textarea.value);
      if (Array.isArray(parsed)) throw new Error(`Product card ${idx + 1} must contain one product object, not an array.`);
      const doc = normalizeDocument({
        id: DOCUMENTS[idx]?.id,
        enabled: document.querySelector(`[data-edit-enabled="${idx}"]`)?.checked !== false,
        data: parsed
      }, idx);
      if (seenIds.has(doc.id)) doc.id = `${doc.id}-${idx + 1}`;
      seenIds.add(doc.id);
      touchDocument(doc);
      next.push(doc);
    });
    DOCUMENTS = next;
    saveCache();
    renderRoadmap();
    if (reopen) openEditor();
    return true;
  } catch(e) {
    alert('Invalid JSON: ' + e.message);
    return false;
  }
}
function ensureUniqueDocumentIds(docs) {
  const seen = new Set();
  return docs.map((doc, idx) => {
    const base = doc.id || slugify(productName(doc) || `roadmap-${idx + 1}`);
    let id = base;
    let suffix = 2;
    while (seen.has(id)) id = `${base}-${suffix++}`;
    seen.add(id);
    return { ...doc, id };
  });
}
function addProductDocument() {
  if (!saveEditorDocuments(false)) return;
  DOCUMENTS.push(normalizeDocument({ project: 'New Product', title: 'Product Roadmap', subtitle: 'Interactive Deliverables & Timeline', owner: 'Product Team', deliverables: [] }, DOCUMENTS.length));
  DOCUMENTS = ensureUniqueDocumentIds(DOCUMENTS);
  saveCache();
  renderRoadmap();
  openEditor();
}
function nextDeliverableId(doc) {
  const alpha = slugify(productName(doc)).replace(/[^a-z]/g, '');
  const prefix = (alpha.slice(0, 2) || 'rd').padEnd(2, 'd');
  const existing = new Set((doc.data.deliverables || []).map(d => d.id));
  let i = (doc.data.deliverables || []).length + 1;
  let id = `${prefix}-${String(i).padStart(3, '0')}`;
  while (existing.has(id)) id = `${prefix}-${String(++i).padStart(3, '0')}`;
  return id;
}

      <div class="field"><label>Favorite</label><label class="toggle-pill"><input id="newDelFavorite" type="checkbox"> Favorite task</label></div>

      <div class="field span-2"><label>Description</label><textarea id="newDelDesc" rows="4" placeholder="Optional description or acceptance criteria..."></textarea></div>

  `);

function saveNewDeliverable(docIndex) {
  const doc = DOCUMENTS[docIndex];
  if (!doc) { openEditor(); return; }
  const title = ($('#newDelTitle').value || '').trim();
  if (!title) { alert('Task title is required.'); return; }
  const dueDateText = ($('#newDelDueDate').value || '').trim();
  const dueDate = dueDateText ? normalizeDueDate({ date: dueDateText, status: $('#newDelStatus').value || 'not-started', note: '' }, $('#newDelStatus').value || 'not-started') : null;
  const dueMonth = dueDate ? monthKeyFromDueDate(dueDate) : null;
  const defaultMonth = getCurrentMonthKey();
  const startValue = ($('#newDelStart').value || '').trim();
  const endValue = ($('#newDelEnd').value || '').trim();
  const start = dueMonth && startValue === defaultMonth ? dueMonth : (startValue || dueMonth || defaultMonth);
  const end = dueMonth && endValue === defaultMonth ? dueMonth : (endValue || dueMonth || start);
  const deliverable = {
    id: nextDeliverableId(doc),
    title,
    owner: ($('#newDelOwner').value || doc.data.owner || '').trim(),
    status: $('#newDelStatus').value || 'not-started',
    start,
    end,
    desc: ($('#newDelDesc').value || '').trim(),
    tags: normalizeTags($('#newDelTags').value || ''),
    favorite: Boolean($('#newDelFavorite')?.checked),
    dueDates: dueDate ? [dueDate] : [],
    notes: []
  };
  if (!Array.isArray(doc.data.deliverables)) doc.data.deliverables = [];
  doc.data.deliverables.push(deliverable);
  touchDocument(doc);
  saveCache();
  renderRoadmap();
  openDetail(deliverable, doc, deliverable.dueDates[0] || null);
}
async function loadJsonDocumentsFromFiles(event) {
  const input = event.target;
  const files = Array.from(input.files || []);
  if (!files.length) return;
  if (!saveEditorDocuments(false)) { input.value = ''; return; }
  try {
    const imported = [];
    for (const file of files) {
      const text = await file.text();
      const parsed = JSON.parse(text);
      imported.push(...normalizeDocuments(parsed));
    }
    if (!imported.length) throw new Error('No roadmap documents found in selected file(s).');
    DOCUMENTS = ensureUniqueDocumentIds([...DOCUMENTS, ...imported]);
    saveCache();
    renderRoadmap();
    openEditor();
  } catch(e) {
    alert('Unable to load JSON document: ' + e.message);
  } finally {
    input.value = '';
  }
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearCache() {
  if (!confirm('Clear localStorage cache and reset to embedded defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  DOCUMENTS = deepClone(DEFAULT_DOCUMENTS);
  renderRoadmap();
  closeDetail();
}

$('#taskSearch').addEventListener('input', e => { currentSearchQuery = e.target.value; renderRoadmap(); });
$('#btnTagSearch').addEventListener('click', () => { tagSearchOnly = !tagSearchOnly; renderRoadmap(); });
$('#btnFavoritesOnly').addEventListener('click', () => { favoritesOnly = !favoritesOnly; renderRoadmap(); });
$('#btnViewToggle').addEventListener('click', () => { currentView = currentView === 'grid' ? 'linear' : 'grid'; renderRoadmap(); });
$('#btnClearMonth').addEventListener('click', () => { clearDateFilter(); renderRoadmap(); });
$('#yearFilter').addEventListener('change', e => { selectedYearFilter = e.target.value; selectedMonthFilter = selectedYearFilter && selectedMonthNameFilter ? `${selectedMonthNameFilter} ${selectedYearFilter}` : null; renderRoadmap(); });
$('#monthFilter').addEventListener('change', e => { selectedMonthNameFilter = e.target.value; selectedMonthFilter = selectedYearFilter && selectedMonthNameFilter ? `${selectedMonthNameFilter} ${selectedYearFilter}` : null; renderRoadmap(); });
$('#statusFilter').addEventListener('change', e => { currentStatusFilter = e.target.value; renderRoadmap(); });
$('#btnThemeToggle').addEventListener('click', toggleTheme);
$('#btnCopyMarkdown').addEventListener('click', copyMarkdownToClipboard);
$('#btnEdit').addEventListener('click', openEditor);
$('#btnClose').addEventListener('click', closeDetail);
$('#overlay').addEventListener('click', closeDetail);
$('#btnNow').addEventListener('click', () => {
  if (currentView === 'linear') {
    const current = document.querySelector('.linear-row.current-week');
    if (current) current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  const idx = monthIndex(getCurrentMonthKey());
  if (idx < 0) return;
  const wrap = $('#roadmapWrap');
  const monthWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--month-col')) || 55;
  const nameWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--name-col')) || 240;
  wrap.scrollTo({ left: nameWidth + (monthWidth * idx) - (wrap.clientWidth / 2) + (monthWidth / 2), behavior: 'smooth' });
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

applyTheme(currentTheme);
renderRoadmap();
</script>
</body>
